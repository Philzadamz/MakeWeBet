# Football IQ — production reverse proxy.
# TLS terminates at Cloudflare; origin speaks HTTP to nginx on :80.
worker_processes auto;

events {
  worker_connections 4096;
}

http {
  sendfile on;
  tcp_nopush on;
  server_tokens off;

  # Cloudflare sits in front; trust its connecting IPs for real client IPs.
  real_ip_header CF-Connecting-IP;

  upstream web {
    server web:3000;
  }
  upstream api {
    server api:4000;
  }

  # Modest origin-side rate limit; the API's Redis throttler is the real one.
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;

  server {
    listen 80;
    client_max_body_size 5m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
      limit_req zone=api_zone burst=60 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # WebSockets (live leaderboard gateway)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 75s;
    }

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
