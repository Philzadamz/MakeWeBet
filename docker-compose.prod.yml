# Production-shaped stack: nginx → web + api, separate worker, managed-DB
# ready (point DATABASE_URL at RDS and drop the postgres service in prod).
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

  api:
    image: fiq-api:dev
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.production
    environment:
      RUN_WORKERS: "false" # HTTP pods don't process jobs
    command: ["node", "dist/main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    image: fiq-api:dev
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.production
    environment:
      RUN_WORKERS: "true"
    command: ["node", "dist/worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  migrate:
    image: fiq-api:dev
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.production
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: fiq-web:dev
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env.production

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-fiq}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiq"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata_prod:/data

volumes:
  pgdata_prod:
  redisdata_prod:
